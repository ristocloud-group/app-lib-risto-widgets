name: risto_widgets
description: "A Flutter library with customizable UI widgets for buttons, expandable list tiles, and more."
version: 0.2.2
homepage: "https://github.com/ristocloud-group/app-lib-risto-widgets"

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  lottie: ^3.3.3
  expandable: ^5.0.1
  font_awesome_flutter: ^10.12.0
  html2md: ^1.3.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  flutter_map: ^8.3.0
  flutter_map_marker_cluster: ^8.2.2
  geolocator: ^14.0.2
  latlong2: ^0.9.1

  equatable: ^2.0.8
  flutter_bloc: ^9.1.1

dependency_overrides:
  package_info_plus:
    path: packages/package_info_plus

  geolocator_linux:
    path: packages/geolocator_linux

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.ristocloudgroup.lib.risto_widgets
        pluginClass: RistoWidgetsPlugin
      ios:
        pluginClass: RistoWidgetsPlugin
