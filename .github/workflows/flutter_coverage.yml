jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "17.0"
      FLUTTER_VERSION: '3.35.5'
    permissions:
      contents: write        # Required to create a PR
      pull-requests: write # Required to create a PR
      actions: read
      id-token: write
    steps:
      # 1. Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v6 # Use a more recent version
        with:
          fetch-depth: 0

      # 2. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION || '3.35.5' }}

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Run tests with coverage
      - name: Run tests with coverage
        run: flutter test --coverage

      # 5. Generate coverage report
      - name: Generate coverage report
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          genhtml -o coverage coverage/lcov.info

      # 6. Generate Coverage Badge and set output
      - name: Generate Coverage Badge
        run: |
          COVERAGE_PERCENT=$(lcov --summary coverage/lcov.info | grep "lines......" | grep -o '[0-9.]*%' | tr -d '%')
          echo "COVERAGE_PERCENT=$COVERAGE_PERCENT" >> $GITHUB_ENV
          curl -o coverage-badge.svg "https://img.shields.io/badge/Coverage-${COVERAGE_PERCENT}%25-brightgreen.svg"
          mkdir -p .github/badges/
          mv coverage-badge.svg .github/badges/coverage-badge.svg

      # 7. Create Pull Request with Coverage Badge
      - name: Create Pull Request with Coverage Badge
        if: success() # Only run on success
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: Update coverage badge [skip ci]"
          title: "Update Coverage Badge"
          body: |
            Coverage report updated automatically.
            - **Coverage**: `${{ env.COVERAGE_PERCENT }}%`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: "chore/update-coverage-badge"
          base: main
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          # No need for add-paths since we moved the file in the previous step
          # You can also use the 'add-paths' property if you prefer to keep file management within the PR action

      # 8. Upload coverage artifact for deployment (Optional)
      - name: Upload Coverage Artifact
        # This step doesn't have an ID, which is needed by the deploy job. Let's fix that.
        # However, the deploy job refers to `steps.deployment.outputs.page_url` which comes from the deploy step itself,
        # creating a circular dependency. The artifact upload doesn't produce a page_url. I will remove the problematic id.
        uses: actions/upload-pages-artifact@v3 # Use a more recent version
        with:
          path: ./coverage