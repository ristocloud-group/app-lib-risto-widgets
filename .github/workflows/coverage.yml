name: Coverage Badge & Web Report

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  coverage-and-deploy:
    name: Coverage & Deploy Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Generate HTML & Badge SVG
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          
          genhtml -o coverage coverage/lcov.info
          
          COVERAGE_PERCENT=$(lcov --summary coverage/lcov.info | grep "lines......" | grep -o '[0-9.]*%' | tr -d '%')
          echo "COVERAGE_PERCENT=$COVERAGE_PERCENT" >> $GITHUB_ENV
          
          curl -o coverage-badge.svg "https://img.shields.io/badge/Coverage-${COVERAGE_PERCENT}%25-brightgreen.svg"
          mkdir -p .github/badges/
          mv coverage-badge.svg .github/badges/coverage-badge.svg

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'coverage'

      - name: Generate GitHub App Token
        id: generate_pr_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ORG_CI_APP_ID }}
          private-key: ${{ secrets.ORG_CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Create Pull Request with Coverage Badge
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.generate_pr_token.outputs.token }}
          add-paths: .github/badges/coverage-badge.svg
          commit-message: "chore: Update coverage badge [skip ci]"
          title: "Update Coverage Badge"
          body: "Coverage report updated automatically.\n- **Coverage**: `${{ env.COVERAGE_PERCENT }}%`"
          branch: "chore/update-coverage-badge"
          base: main

      - name: Approve Coverage PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr review --approve "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge Coverage PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.generate_pr_token.outputs.token }}


      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4