documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**/*'
          - 'CHANGELOG.md'
          - 'LICENSE'
          - 'README.md'

test:
  - changed-files:
      - any-glob-to-any-file:
          - 'test/**/*'

example:
  - changed-files:
      - any-glob-to-any-file:
          - 'example/**/*'

android:
  - changed-files:
      - any-glob-to-any-file:
          - 'android/**/*'

workflows:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**/*'

lib:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/**/*'
